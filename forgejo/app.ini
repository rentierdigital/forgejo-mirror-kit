; Forgejo Mirror Kit - minimal config for pull-only mirroring
; Docs: https://forgejo.org/docs/latest/admin/config-cheat-sheet/

[server]
DOMAIN           = ${FORGEJO_DOMAIN}
ROOT_URL         = http://${FORGEJO_DOMAIN}:3000/
SSH_DOMAIN       = ${FORGEJO_DOMAIN}
HTTP_PORT        = 3000
SSH_PORT         = 22
LFS_START_SERVER = false              ; no LFS needed for mirror-only

[database]
DB_TYPE  = postgres
HOST     = db:5432                    ; matches docker-compose service name
NAME     = forgejo
USER     = forgejo
PASSWD   = ${POSTGRES_PASSWORD}       ; injected from .env via docker-compose
SSL_MODE = disable                    ; internal network, no TLS needed

[repository]
DEFAULT_BRANCH = main
DEFAULT_PRIVATE = public              ; mirrors are read-only, no secrets

[mirror]
DEFAULT_INTERVAL = ${MIRROR_INTERVAL}h  ; how often to pull from upstream (default: 8h)
MIN_INTERVAL     = 1h                   ; floor - prevents accidental API hammering

; --- Disable features we don't need (this is a mirror, not a full forge) ---

[repository.upload]
ENABLED = false                       ; no file uploads - we pull, not push

[service]
DISABLE_REGISTRATION       = true     ; admin-only - no public signups
ENABLE_NOTIFY_MAIL         = false    ; no email notifications
DEFAULT_ALLOW_CREATE_ORGANIZATION = false

[packages]
ENABLED = false                       ; no package registry

[actions]
ENABLED = false                       ; no CI/CD

[other]
SHOW_FOOTER_VERSION = false           ; cleaner UI

[log]
MODE  = console
LEVEL = warn                          ; quiet logs - bump to info for debugging
